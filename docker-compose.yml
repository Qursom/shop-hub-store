# Set the project name for Docker Desktop and CLI identification
name: shop-hub

services:
  # Backend Serverless API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    pull_policy: if_not_present
    container_name: api
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    healthcheck:
      # Uses Node.js (already in the image) to verify the API responds on port 3000
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => { r.resume(); process.exit(0); }).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Frontend Angular App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    pull_policy: if_not_present
    container_name: frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      api:
        condition: service_healthy

volumes:
  api_node_modules:
  frontend_node_modules:
