repos:
    - repo: local
      hooks:
          - id: lint
            name: ESLint
            entry: npx eslint --max-warnings=0
            language: system
            types:
                - javascript
                - ts
                - jsx
                - tsx
                - html
                - markdown
            stages: [pre-commit]

          - id: format
            name: Prettier
            entry: npx prettier --write
            language: system
            types:
                - javascript
                - ts
                - jsx
                - tsx
                - css
                - scss
                - less
                - html
                - json
                - yaml
                - markdown
            stages: [pre-commit]

    - repo: local
      hooks:
          - id: commitlint
            name: commitlint
            entry: npx commitlint --edit
            language: system
            stages: [commit-msg]

    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v4.5.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-added-large-files
